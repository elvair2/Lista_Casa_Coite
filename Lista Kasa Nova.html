<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobrevivência Casa Nova</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --container-bg: #ffffff;
            --text-main: #333;
            --accent: #ff6b6b;
            --accent-hover: #e05b5b;
            --success: #4ecdc4;
            --border: #ddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: var(--accent);
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        p.subtitle {
            text-align: center;
            font-style: italic;
            color: #666;
            margin-bottom: 30px;
        }

        .category-card {
            background: var(--container-bg);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--success);
        }

        .category-title {
            font-size: 1.4em;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.2s;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item.checked .item-text {
            text-decoration: line-through;
            color: #999;
        }

        input[type="checkbox"] {
            margin-right: 15px;
            transform: scale(1.3);
            cursor: pointer;
            accent-color: var(--success);
        }

        .item-text {
            flex-grow: 1;
            font-size: 1.1em;
            cursor: pointer;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.2em;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .delete-btn:hover {
            opacity: 1;
        }

        .add-form {
            display: flex;
            margin-top: 15px;
            gap: 10px;
        }

        .add-input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 5px;
            font-size: 1em;
        }

        .add-btn {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background-color: #3eb5ad;
        }
        
        .reset-btn {
            display: block;
            margin: 30px auto;
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        .reset-btn:hover {
            background: var(--accent);
            color: white;
        }
    </style>
</head>
<body>

    <div id="app"></div>

                { id: "602", text: "Cozinha: Tomada de 20A para cooktop", done: false },
                { id: "603", text: "Geral: Trocar todos interruptores/tomadas velhos (padrão espelho R$ 10)", done: false },
                { id: "604", text: "Teto: Retirar bocais podres", done: false },
                { id: "605", text: "Teto: Instalar 7x Plafons de LED", done: false },
                { id: "606", text: "Quarto: Instalar ventilador de teto", done: false },
                { id: "607", text: "Banheiro: Colocar interruptor de sobrepor", done: false },
                { id: "608", text: "Banheiro: Instalar plafon teto sem canaletas", done: false }
            ]
        };

        // Carrega do LocalStorage. Se for a versão velha, a chave foi alterada para forçar reset limpo
        let appData = JSON.parse(localStorage.getItem('casaNovaChecklistV2')) || defaultData;

        function saveData() {
            localStorage.setItem('casaNovaChecklistV2', JSON.stringify(appData));
        }

        function resetApp() {
            if(confirm("Isso vai apagar tudo que você marcou e restaurar a lista original. Tem certeza?")) {
                localStorage.removeItem('casaNovaChecklistV2');
                appData = JSON.parse(JSON.stringify(defaultData));
                saveData();
                render();
            }
        }

        function toggleItem(category, id) {
            const item = appData[category].find(i => i.id === id);
            if (item) {
                item.done = !item.done;
                saveData();
                render();
            }
        }

        function deleteItem(category, id) {
            appData[category] = appData[category].filter(i => i.id !== id);
            saveData();
            render();
        }

        function addItem(category) {
            const input = document.getElementById(`input-${category.replace(/[^a-zA-Z0-9]/g, '')}`);
            const text = input.value.trim();
            if (text) {
                appData[category].push({
                    id: Date.now().toString(),
                    text: text,
                    done: false
                });
                input.value = '';
                saveData();
                render();
            }
        }

        function handleKeyPress(event, category) {
            if (event.key === 'Enter') {
                addItem(category);
            }
        }

        function render() {
            const container = document.getElementById('app');
            container.innerHTML = '';

            for (const category in appData) {
                const card = document.createElement('div');
                card.className = 'category-card';

                const totalItems = appData[category].length;
                const doneItems = appData[category].filter(i => i.done).length;
                
                // Só cria o id seguro para o input (sem espaços/caracteres especiais)
                const safeCategoryId = category.replace(/[^a-zA-Z0-9]/g, '');

                let itemsHTML = '';
                appData[category].forEach(item => {
                    itemsHTML += `
                        <li class="item ${item.done ? 'checked' : ''}">
                            <input type="checkbox" ${item.done ? 'checked' : ''} 
                                onchange="toggleItem('${category}', '${item.id}')">
                            <span class="item-text" onclick="toggleItem('${category}', '${item.id}')">${item.text}</span>
                            <button class="delete-btn" onclick="deleteItem('${category}', '${item.id}')" title="Excluir">✖</button>
                        </li>
                    `;
                });

                card.innerHTML = `
                    <h2 class="category-title">
                        ${category} 
                        <span style="font-size: 0.7em; color: #888;">${doneItems}/${totalItems}</span>
                    </h2>
                    <ul class="item-list">
                        ${itemsHTML}
                    </ul>
                    <div class="add-form">
                        <input type="text" id="input-${safeCategoryId}" class="add-input" 
                            placeholder="Adicionar novo item..." 
                            onkeypress="handleKeyPress(event, '${category}')">
                        <button class="add-btn" onclick="addItem('${category}')">Adicionar</button>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        render();
    </script>
